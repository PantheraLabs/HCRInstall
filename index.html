<!DOCTYPE html>
<html>
<head>
    <title>Install HCR</title>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; max-width: 800px; margin: 60px auto; padding: 0 20px; background: #0a0a0a; color: #e0e0e0; line-height: 1.6; }
        h1 { color: #00d4ff; border-bottom: 2px solid #00d4ff; padding-bottom: 15px; margin-bottom: 30px; }
        h3 { color: #00d4ff; margin-top: 30px; }
        p { color: #a0a0a0; }
        .cmd { background: #1a1a1a; padding: 18px 22px; border-radius: 10px; margin: 15px 0; border-left: 4px solid #00d4ff; }
        .cmd code { color: #fff; font-size: 15px; font-family: 'SF Mono', 'Cascadia Code', monospace; }
        .platform { margin: 40px 0; }
        a { color: #00d4ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #333; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>HCR CLI Installer</h1>
    <p>Hybrid Cognitive Runtime — State-based AI context for developers</p>

    <div class="platform">
        <h3>macOS / Linux</h3>
        <div class="cmd"><code>curl -fsSL https://install.hcr.dev | bash</code></div>
    </div>

    <div class="platform">
        <h3>Windows (PowerShell)</h3>
        <div class="cmd"><code>irm https://install.hcr.dev/win | iex</code></div>
    </div>

    <div class="footer">
        <p><a href="https://github.com/PantheraLabs/HybridCognitiveRuntime">GitHub →</a> · Version 0.2.0</p>
    </div>
</body>
</html>
